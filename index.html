<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyTaptap — All your links, one place</title>
    <meta name="description" content="Create your personalized link page in seconds. Share everything that matters with your audience. The best free link-in-bio tool for creators, influencers and businesses." />
    <meta name="author" content="MyTaptap" />
    <meta name="robots" content="index, follow" />
    <meta name="keywords" content="link in bio, linktree alternative, creator links, social media links, bio link, link page, mytaptap" />
    <link rel="canonical" href="https://mytaptap.com" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:title" content="MyTaptap — All your links, one place" />
    <meta property="og:description" content="Create your personalized link page in seconds. Share everything that matters with your audience." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mytaptap.com" />
    <meta property="og:site_name" content="MyTaptap" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:locale:alternate" content="de_DE" />
    <meta property="og:locale:alternate" content="it_IT" />
    <meta property="og:locale:alternate" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MyTaptap — All your links, one place" />
    <meta name="twitter:description" content="Create your personalized link page in seconds. Share everything that matters with your audience." />
    <meta name="twitter:site" content="@mytaptap" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "MyTaptap",
      "url": "https://mytaptap.com",
      "description": "Create your personalized link page in seconds. Share everything that matters with your audience.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "AggregateOffer",
        "priceCurrency": "EUR",
        "lowPrice": "0",
        "highPrice": "115",
        "offerCount": "3"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "2000"
      },
      "featureList": [
        "Unlimited links",
        "Custom themes",
        "Detailed analytics",
        "Drag and drop reordering",
        "Multilingual support",
        "Mobile responsive"
      ]
    }
    </script>
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <script>
      (function(){
        var stored = localStorage.getItem('theme');
        var isDark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if(isDark) document.documentElement.classList.add('dark');
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',function(e){
          if(!localStorage.getItem('theme')){
            document.documentElement.classList.toggle('dark', e.matches);
          }
        });
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
