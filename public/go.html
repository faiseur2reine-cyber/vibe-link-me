<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Redirecting...</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0a;color:#fff;font-family:-apple-system,system-ui,sans-serif;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
  .spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,0.1);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:20px}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:18px;font-weight:700;margin-bottom:6px}
  .sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:28px;line-height:1.5}
  .btn{display:block;width:100%;max-width:320px;background:#fff;color:#000;border:none;border-radius:14px;padding:18px 24px;font-size:17px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;text-decoration:none;text-align:center;margin:0 auto}
  .btn:active{transform:scale(0.97)}
  .hint{margin-top:20px;font-size:12px;color:rgba(255,255,255,0.2);line-height:1.6;max-width:280px}
  .hint strong{color:rgba(255,255,255,0.4)}
  .hidden{display:none}
  .url-display{font-size:11px;color:rgba(255,255,255,0.15);margin-top:24px;word-break:break-all;max-width:280px}
</style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <h1>Ouverture en cours...</h1>
    <p class="sub">Redirection vers ton navigateur</p>
  </div>

  <div id="fallback" class="hidden">
    <h1>Ouvre dans ton navigateur</h1>
    <p class="sub">Cette app bloque l'ouverture directe</p>
    <button id="manual-btn" class="btn">
      Ouvrir dans le navigateur
    </button>
    <p class="hint">
      Si ça ne marche pas, appuie sur <strong>⋯</strong> en haut à droite puis <strong>Ouvrir dans Safari</strong>
    </p>
    <p id="url-text" class="url-display"></p>
  </div>

<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var target = params.get('url');
  if (!target) { document.getElementById('loading').innerHTML = '<p style="color:rgba(255,255,255,0.4)">Lien invalide</p>'; return; }

  var ua = navigator.userAgent || '';
  var isAndroid = /Android/i.test(ua);
  var isIOS = /iPhone|iPad|iPod/i.test(ua);

  // === ATTEMPT BREAKOUT (no fallback to target URL) ===

  if (isAndroid) {
    // intent:// — asks OS to open in default browser
    var stripped = target.replace(/^https?:\/\//, '');
    var scheme = target.indexOf('https://') === 0 ? 'https' : 'http';
    window.location.href = 'intent://' + stripped + '#Intent;scheme=' + scheme + ';action=android.intent.action.VIEW;S.browser_fallback_url=' + encodeURIComponent(target) + ';end';
  } else if (isIOS) {
    // x-safari — opens Safari directly (iOS 17.4+)
    var safariUrl = target.indexOf('https://') === 0
      ? target.replace('https://', 'x-safari-https://')
      : target.replace('http://', 'x-safari-http://');
    window.location.href = safariUrl;
  }

  // === SHOW FALLBACK AFTER 2s (if we're still here = breakout failed) ===

  setTimeout(function() {
    // If we're not on this page anymore, breakout worked
    if (!document.hasFocus()) return;

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('fallback').classList.remove('hidden');
    document.getElementById('url-text').textContent = target;

    // Manual button: retry breakout with user interaction (more permissions)
    document.getElementById('manual-btn').addEventListener('click', function() {
      if (isAndroid) {
        var stripped = target.replace(/^https?:\/\//, '');
        var scheme = target.indexOf('https://') === 0 ? 'https' : 'http';
        window.location.href = 'intent://' + stripped + '#Intent;scheme=' + scheme + ';action=android.intent.action.VIEW;S.browser_fallback_url=' + encodeURIComponent(target) + ';end';
      } else if (isIOS) {
        var safariUrl = target.indexOf('https://') === 0
          ? target.replace('https://', 'x-safari-https://')
          : target.replace('http://', 'x-safari-http://');
        window.location.href = safariUrl;
      }
      // NO fallback to window.location.href = target
      // That would open in the webview which defeats the purpose
    });
  }, 2000);

})();
</script>
</body>
</html>
