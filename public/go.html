<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Redirecting...</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0a;color:#fff;font-family:-apple-system,system-ui,sans-serif;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
  .spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,0.1);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:20px}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:18px;font-weight:700;margin-bottom:6px}
  .sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:28px;line-height:1.5}
  .btn{display:block;width:100%;max-width:320px;background:#fff;color:#000;border:none;border-radius:14px;padding:18px 24px;font-size:17px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;text-decoration:none;text-align:center;margin:0 auto}
  .btn:active{transform:scale(0.97)}
  .hint{margin-top:20px;font-size:12px;color:rgba(255,255,255,0.2);line-height:1.6;max-width:280px}
  .hint strong{color:rgba(255,255,255,0.4)}
  .hidden{display:none}
</style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <h1>Ouverture en cours...</h1>
    <p class="sub">Redirection vers ton navigateur</p>
  </div>

  <div id="fallback" class="hidden">
    <h1>Ouvre dans ton navigateur</h1>
    <p class="sub">Appuie pour continuer</p>
    <button id="manual-btn" class="btn">Ouvrir dans le navigateur</button>
    <p class="hint">
      Si ça ne marche pas :<br>
      <strong>⋯</strong> en haut → <strong>Ouvrir dans Safari</strong>
    </p>
  </div>

<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var target = params.get('url');
  if (!target) { document.getElementById('loading').innerHTML = '<p style="color:rgba(255,255,255,0.4)">Lien invalide</p>'; return; }

  var ua = navigator.userAgent || '';
  var isAndroid = /Android/i.test(ua);
  var isIOS = /iPhone|iPad|iPod/i.test(ua);
  var isIG = /instagram/i.test(ua);
  var isFB = /FBAN|FBAV/i.test(ua);
  var isTT = /musical_ly|BytedanceWebview|TikTok/i.test(ua);
  var isInApp = isIG || isFB || isTT || /Snapchat|Twitter|LinkedIn|Line\//i.test(ua);
  var timer;

  // iOS version
  var iosVer = 0;
  var iosMatch = ua.match(/OS (\d+)/);
  if (iosMatch) iosVer = parseInt(iosMatch[1]);

  // === APP URL SCHEMES ===
  // For apps that have native URL schemes, open the app directly
  var APP_SCHEMES = {
    'twitter.com':    function(u) { var m = u.match(/twitter\.com\/([^/?#]+)/); return m ? 'twitter://user?screen_name=' + m[1] : null; },
    'x.com':          function(u) { var m = u.match(/x\.com\/([^/?#]+)/); return m ? 'twitter://user?screen_name=' + m[1] : null; },
    'tiktok.com':     function(u) { var m = u.match(/tiktok\.com\/@([^/?#]+)/); return m ? 'snssdk1233://user/profile/' + m[1] : null; },
    'youtube.com':    function(u) { return 'vnd.youtube://' + u.replace(/^https?:\/\/(www\.)?youtube\.com/, ''); },
    'youtu.be':       function(u) { var m = u.match(/youtu\.be\/([^/?#]+)/); return m ? 'vnd.youtube://watch?v=' + m[1] : null; },
    'instagram.com':  function(u) { var m = u.match(/instagram\.com\/([^/?#]+)/); return m ? 'instagram://user?username=' + m[1] : null; },
    'snapchat.com':   function(u) { var m = u.match(/snapchat\.com\/add\/([^/?#]+)/); return m ? 'snapchat://add/' + m[1] : null; },
    'open.spotify.com': function(u) { return u.replace('https://open.spotify.com', 'spotify://'); },
    't.me':           function(u) { return u.replace('https://t.me', 'tg://resolve?domain=').replace('/', ''); },
    'telegram.me':    function(u) { return u.replace('https://telegram.me', 'tg://resolve?domain=').replace('/', ''); },
  };

  function getAppScheme(url) {
    try {
      var host = new URL(url).hostname.replace(/^www\./, '');
      for (var key in APP_SCHEMES) {
        if (host === key || host.endsWith('.' + key)) {
          return APP_SCHEMES[key](url);
        }
      }
    } catch(e) {}
    return null;
  }

  function directRedirect(url) {
    clearTimeout(timer);
    window.location.href = url;
  }

  function showFallback() {
    if (document.hidden) return;
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('fallback').classList.remove('hidden');
    document.getElementById('manual-btn').onclick = function() { attemptBreakout(true); };
  }

  function attemptBreakout(isManual) {
    // 1. Try app URL scheme first (works in webviews!)
    var scheme = getAppScheme(target);
    if (scheme) {
      window.location.href = scheme;
      timer = setTimeout(function() {
        // If still here, app not installed → fallback to target
        if (!document.hidden) directRedirect(target);
      }, 1500);
      return;
    }

    // 2. Android: intent://
    if (isAndroid) {
      try {
        var parsed = new URL(target);
        var intentUrl = 'intent://' + parsed.host + parsed.pathname + parsed.search
          + '#Intent;scheme=' + parsed.protocol.replace(':', '')
          + ';package=com.android.chrome'
          + ';S.browser_fallback_url=' + encodeURIComponent(target)
          + ';end';
        window.location.href = intentUrl;
        timer = setTimeout(function() {
          if (!document.hidden) directRedirect(target);
        }, 1500);
      } catch(e) { directRedirect(target); }
      return;
    }

    // 3. iOS 17+ : x-safari
    if (isIOS && iosVer >= 17) {
      try {
        var parsed = new URL(target);
        var safariUrl = 'x-safari-' + target;

        if (isIG) {
          // Instagram on iOS: window.open works better than location.href
          window.open(safariUrl, '_blank');

          // Listen for visibility change = breakout worked
          var onVis = function() {
            if (document.visibilityState === 'hidden') {
              document.removeEventListener('visibilitychange', onVis);
            }
          };
          document.addEventListener('visibilitychange', onVis);

          timer = setTimeout(function() {
            document.removeEventListener('visibilitychange', onVis);
            if (!document.hidden) {
              // x-safari failed → show fallback (not direct redirect)
              if (isManual) {
                // User already tapped the button once, redirect as last resort
                directRedirect(target);
              } else {
                showFallback();
              }
            }
          }, 2500);
        } else {
          // Other in-app browsers on iOS
          window.location.href = safariUrl;
          timer = setTimeout(function() {
            if (!document.hidden) {
              if (isManual) directRedirect(target);
              else showFallback();
            }
          }, 2500);
        }
      } catch(e) { directRedirect(target); }
      return;
    }

    // 4. Older iOS or unknown: direct redirect
    directRedirect(target);
  }

  // === GO ===
  if (!isInApp) {
    // Native browser: just redirect
    directRedirect(target);
  } else {
    attemptBreakout(false);
  }

})();
</script>
</body>
</html>
