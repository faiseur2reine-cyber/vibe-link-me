<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Redirecting...</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0a;color:#fff;font-family:-apple-system,system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
  .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:24px}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:18px;font-weight:700;margin-bottom:8px}
  p{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:32px;line-height:1.5}
  .btn{display:block;width:100%;max-width:320px;background:#fff;color:#000;border:none;border-radius:14px;padding:18px 24px;font-size:17px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;text-decoration:none;text-align:center}
  .btn:active{transform:scale(0.97)}
  .hint{margin-top:16px;font-size:12px;color:rgba(255,255,255,0.25);line-height:1.5}
  .hidden{display:none}
</style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <h1>Ouverture en cours...</h1>
    <p>Redirection vers ton navigateur</p>
  </div>

  <div id="fallback" class="hidden">
    <h1>Ouvre dans ton navigateur</h1>
    <p>Appuie sur le bouton pour continuer</p>
    <button id="manual-btn" class="btn">
      Ouvrir dans le navigateur
    </button>
    <p class="hint">
      Ou appuie sur <strong>⋯</strong> en haut puis <strong>Ouvrir dans le navigateur</strong>
    </p>
  </div>

<script>
(function(){
  // Read target URL from query param
  var params = new URLSearchParams(window.location.search);
  var target = params.get('url');
  if (!target) { document.getElementById('loading').innerHTML = '<p>Lien invalide</p>'; return; }

  var ua = navigator.userAgent || '';
  var isAndroid = /Android/i.test(ua);
  var isIOS = /iPhone|iPad|iPod/i.test(ua);

  function tryBreakout() {
    // Android: intent://
    if (isAndroid) {
      var stripped = target.replace(/^https?:\/\//, '');
      var scheme = target.indexOf('https://') === 0 ? 'https' : 'http';
      window.location.href = 'intent://' + stripped + '#Intent;scheme=' + scheme + ';action=android.intent.action.VIEW;S.browser_fallback_url=' + encodeURIComponent(target) + ';end';
      setTimeout(function() { window.location.href = target; }, 1500);
      setTimeout(showFallback, 3000);
      return;
    }

    // iOS: x-safari
    if (isIOS) {
      var safariUrl = target.indexOf('https://') === 0
        ? target.replace('https://', 'x-safari-https://')
        : target.replace('http://', 'x-safari-http://');
      window.location.href = safariUrl;

      setTimeout(function() {
        if (document.hasFocus()) {
          try { window.open(target, '_blank'); } catch(e) {}
        }
      }, 1000);

      setTimeout(function() {
        if (document.hasFocus()) window.location.href = target;
      }, 2000);

      setTimeout(showFallback, 3000);
      return;
    }

    // Unknown
    window.location.href = target;
    setTimeout(showFallback, 2000);
  }

  function showFallback() {
    if (!document.hasFocus()) return;
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('fallback').classList.remove('hidden');

    document.getElementById('manual-btn').addEventListener('click', function() {
      if (isAndroid) {
        var stripped = target.replace(/^https?:\/\//, '');
        var scheme = target.indexOf('https://') === 0 ? 'https' : 'http';
        window.location.href = 'intent://' + stripped + '#Intent;scheme=' + scheme + ';action=android.intent.action.VIEW;S.browser_fallback_url=' + encodeURIComponent(target) + ';end';
        setTimeout(function() { window.location.href = target; }, 1000);
      } else if (isIOS) {
        var safariUrl = target.indexOf('https://') === 0
          ? target.replace('https://', 'x-safari-https://')
          : target.replace('http://', 'x-safari-http://');
        window.location.href = safariUrl;
        setTimeout(function() { window.location.href = target; }, 1000);
      } else {
        window.location.href = target;
      }
    });
  }

  tryBreakout();
})();
</script>
</body>
</html>
